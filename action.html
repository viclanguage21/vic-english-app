<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIC English — Verificando seu e-mail</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --p:#7c3aed;--pk:#ec4899;--gold:#f2c87a;
      --font:'Inter',system-ui,-apple-system,sans-serif;
    }
    html,body{
      min-height:100vh;width:100%;
      background:linear-gradient(150deg,#08052a 0%,#130845 50%,#08052a 100%);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font);
    }
    .card{
      width:min(420px,94vw);
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(124,58,237,0.3);
      border-radius:28px;
      padding:44px 32px 40px;
      text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation:card-in .4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in{
      from{transform:translateY(32px) scale(0.96);opacity:0}
      to  {transform:translateY(0) scale(1);opacity:1}
    }
    .logo{width:130px;margin-bottom:28px;filter:drop-shadow(0 4px 18px rgba(124,58,237,0.5))}

    /* ── Icon circle ── */
    .icon-wrap{
      width:90px;height:90px;border-radius:50%;
      margin:0 auto 24px;
      display:flex;align-items:center;justify-content:center;
      font-size:40px;
      background:linear-gradient(135deg,var(--p),var(--pk));
      box-shadow:0 0 0 8px rgba(124,58,237,0.15), 0 8px 32px rgba(124,58,237,0.4);
    }
    .icon-wrap.loading{animation:pulse-ring 1.4s ease-in-out infinite}
    .icon-wrap.success{background:linear-gradient(135deg,#20c9bc,#7c3aed)}
    .icon-wrap.error  {background:linear-gradient(135deg,#ef4444,#ec4899)}
    @keyframes pulse-ring{
      0%  {box-shadow:0 0 0 0 rgba(124,58,237,0.5),  0 8px 32px rgba(124,58,237,0.4)}
      70% {box-shadow:0 0 0 16px rgba(124,58,237,0),  0 8px 32px rgba(124,58,237,0.4)}
      100%{box-shadow:0 0 0 0 rgba(124,58,237,0),     0 8px 32px rgba(124,58,237,0.4)}
    }
    .icon-wrap.success{animation:success-pop .5s cubic-bezier(0.34,1.56,0.64,1) both .1s}
    @keyframes success-pop{
      from{transform:scale(0.6);opacity:0}
      to  {transform:scale(1);opacity:1}
    }

    h1{
      font-size:22px;font-weight:900;color:#fff;
      margin-bottom:10px;letter-spacing:-0.3px;
      min-height:1.3em;
    }
    p.sub{
      color:rgba(255,255,255,0.55);font-size:14px;
      line-height:1.6;margin-bottom:28px;min-height:2.5em;
    }
    .btn{
      display:inline-block;
      background:linear-gradient(135deg,var(--p),var(--pk));
      color:#fff;font-weight:800;font-size:16px;
      padding:14px 36px;border-radius:14px;border:none;
      cursor:pointer;font-family:var(--font);
      box-shadow:0 4px 20px rgba(124,58,237,0.45);
      transition:transform .15s,box-shadow .15s;
      text-decoration:none;
    }
    .btn:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(124,58,237,0.3)}
    .btn.hidden{display:none}

    /* Sparkles */
    .sparks{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .spark{
      position:absolute;width:6px;height:6px;border-radius:50%;
      animation:spark-fall linear infinite;
      opacity:0;
    }
    @keyframes spark-fall{
      0%  {transform:translateY(-10px) scale(0);opacity:0}
      10% {opacity:1}
      90% {opacity:0.6}
      100%{transform:translateY(100vh) scale(0.3);opacity:0}
    }
  </style>
</head>
<body>
  <div class="sparks" id="sparks"></div>
  <div class="card">
    <img src="/logo_full_2.png" alt="VIC English" class="logo">
    <div class="icon-wrap loading" id="icon-wrap">⏳</div>
    <h1 id="title">Verificando seu e-mail…</h1>
    <p class="sub" id="sub">Aguarde um instante enquanto confirmamos seu endereço de e-mail.</p>
    <a href="https://app.viclanguage.com.br" class="btn hidden" id="btn-cta">Ir para o VIC English 🚀</a>
  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, applyActionCode }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1wmTcVhOFiR8xY3jBDb-mJbd1mDRuCgU",
      authDomain: "victor-app-aef3c.firebaseapp.com",
      projectId: "victor-app-aef3c",
      storageBucket: "victor-app-aef3c.firebasestorage.app",
      messagingSenderId: "313048271409",
      appId: "1:313048271409:web:a01a5a25add0a5e7eee310",
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── Parse URL params ─────────────────────────────────────────────
    const p = new URLSearchParams(location.search);
    const mode  = p.get("mode");
    const code  = p.get("oobCode");
    const cont  = p.get("continueUrl") || "https://app.viclanguage.com.br/?emailVerified=1";

    const wrap  = document.getElementById("icon-wrap");
    const title = document.getElementById("title");
    const sub   = document.getElementById("sub");
    const btn   = document.getElementById("btn-cta");

    function showSuccess(){
      wrap.className  = "icon-wrap success";
      wrap.textContent = "✅";
      title.textContent = "E-mail confirmado!";
      sub.textContent   = "Sua conta VIC English está ativa. Agora é só praticar — bora aprender inglês! 🚀";
      btn.textContent   = "Ir para o VIC English 🚀";
      btn.href = cont;
      btn.classList.remove("hidden");
      spawnSparks();
      setTimeout(()=>{ location.href = cont; }, 3500);
    }

    function showError(msg){
      wrap.className  = "icon-wrap error";
      wrap.textContent = "⚠️";
      title.textContent = "Ops, link inválido";
      sub.textContent   = msg || "Este link de verificação expirou ou já foi usado. Faça login e solicite um novo link.";
      btn.textContent   = "Ir para o VIC English";
      btn.href = "https://app.viclanguage.com.br";
      btn.classList.remove("hidden");
    }

    // ── Verify ───────────────────────────────────────────────────────
    if(mode === "verifyEmail" && code){
      applyActionCode(auth, code)
        .then(showSuccess)
        .catch(()=> showError());
    } else if(mode === "resetPassword" && code){
      // Redirect to app password reset handler
      location.href = `https://app.viclanguage.com.br/?mode=resetPassword&oobCode=${encodeURIComponent(code)}`;
    } else {
      showError("Link de verificação não reconhecido. Volte ao app e tente novamente.");
    }

    // ── Sparkle confetti ─────────────────────────────────────────────
    function spawnSparks(){
      const colors = ["#7c3aed","#ec4899","#f2c87a","#20c9bc","#fff"];
      const cont  = document.getElementById("sparks");
      for(let i=0;i<40;i++){
        const s = document.createElement("div");
        s.className = "spark";
        s.style.cssText = [
          `left:${Math.random()*100}%`,
          `background:${colors[Math.floor(Math.random()*colors.length)]}`,
          `animation-duration:${1.2+Math.random()*2}s`,
          `animation-delay:${Math.random()*1.5}s`,
          `width:${4+Math.random()*6}px`,
          `height:${4+Math.random()*6}px`,
        ].join(";");
        cont.appendChild(s);
      }
    }
  </script>
</body>
</html>
